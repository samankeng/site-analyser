[settings]
profile = black
multi_line_output = 3
include_trailing_comma = True
force_grid_wrap = 0
use_parentheses = True
ensure_newline_before_comments = True
line_length = 100
skip = .venv,venv,env,build,dist
skip_glob = */migrations/*
known_third_party = fastapi,pydantic,starlette,httpx,numpy,pandas,sklearn,joblib,torch,redis,pytest
known_first_party = app
